<div class="spacer"></div>

<div #fadeItem class="contact-container fade-in">
  <span #headerEl class="header">Contact</span>
  <p class="contact-blurb"> Our journey starts here.</p>

  <div class="form-container">
    <form (submit)="sendEmail($event)">
      <div class="form-info-row">
        <div class="form-input">
          <label for="first-name">First Name<span class="required">*</span></label>
          <textarea type="text" id="first-name" name="first-name" rows=1 required></textarea>
        </div>
        <div class="form-input">
          <label for="last-name">Last Name<span class="required">*</span></label>
          <textarea type="text" id="last-name" name="last-name" rows=1 required></textarea>
        </div>
      </div>
      <div class="form-info-row">
        <div class="form-input">
          <label for="email">Email<span class="required">*</span></label>
          <textarea type="text" id="email" name="email" rows=1 required></textarea>
        </div>
        <div class="form-input">
          <label for="organization">Team/Organization<span class="required">*</span></label>
          <textarea type="text" id="organization" name="organization" rows=1 required></textarea>
        </div>
      </div>

      <div class="form-info-message">
        <label for="message">Message<span class="required">*</span></label>
        <textarea id="message" name="message" rows="10" required></textarea>
      </div>
      <button routerLink="/contact" class="my-button">
            <span>Send</span>
      </button>
    </form>
  </div>
</div>
