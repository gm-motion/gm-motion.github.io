


<div class="nav-bar" [ngClass]="{ 'nav-dark': isHome(), 'nav-light': !isHome() }">
  <button
    routerLink="/home"
    class="logo">
    <img
      [src]="isHome() ? logoSvgDark : logoSvgLight"
      alt="Logo"
    />
  </button>

  <!-- desktop nav -->
  <div class="nav-routes">
    <a routerLink="/home" routerLinkActive="active">Home</a>
    <a routerLink="/gfx-work" routerLinkActive="active">GFX Work</a>
    <a routerLink="/about" routerLinkActive="active">About</a>
    <a routerLink="/contact" routerLinkActive="active">Contact</a>
  </div>

  <!-- mobile hamburger -->
  <button
    class="hamburger"
    type="button"
    [ngClass]="{ 'hamburger-dark': isHome(), 'hamburger-light': !isHome() }"
    aria-label="Toggle navigation menu"
    [class.open]="mobileMenuOpen"
    (click)="toggleMobileMenu()">
    <span></span>
    <span></span>
    <span></span>
  </button>
</div>

<!-- mobile-only full screen menu -->
<div
  class="mobile-menu-overlay"
  [class.open]="mobileMenuOpen"
  (click)="closeMobileMenu()">

  <div
    class="mobile-menu-panel"
    [class.open]="mobileMenuOpen"
    (click)="$event.stopPropagation()">

    <div class="mobile-menu-links">
      <a routerLink="/home" routerLinkActive="active" (click)="closeMobileMenu()">Home</a>
      <a routerLink="/gfx-work" routerLinkActive="active" (click)="closeMobileMenu()">GFX Work</a>
      <a routerLink="/about" routerLinkActive="active" (click)="closeMobileMenu()">About</a>
      <a routerLink="/contact" routerLinkActive="active" (click)="closeMobileMenu()">Contact</a>
    </div>

    <div class="mobile-menu-footer">
      <div class="mobile-menu-socials">
        @for (social of footerSocials; track social.label) {
          <a
            [href]="social.socialLink"
            target="_blank"
            rel="noopener noreferrer"
            class="footer-social"
          >
            <img
              [src]="social.icon?.asset?.url"
              [alt]="social.icon?.alt"
              class="footer-social-icon"
            />
          </a>
        }
      </div>
    </div>

  </div>
</div>

<main class="content">
  <router-outlet></router-outlet>
</main>


<div class="footer">
  <div headerAnimation class="footer-info">
    <span class="footer-header">{{footerHeader}}</span>
    <div class="footer-text">{{footerParagraph}}</div>
  </div>
  <div class="footer-socials-bar">
    <div class="footer-logo-theme-row">
        <button
          routerLink="/home"
          class="logo logo-light">
          <img [src]="logoSvgLight" alt="Logo" />
        </button>
      <div class="theme-toggle">
        <mat-slide-toggle
          #darkModeSwitch
          [checked]="theme.isLight()"
          (change)="toggleTheme()">
        </mat-slide-toggle>
      </div>
    </div>

    <div class="footer-socials-row">
      @for (social of footerSocials; track social.label) {
        <a
          [href]="social.socialLink"
          target="_blank"
          rel="noopener noreferrer"
          class="footer-social"
        >
          <img
            [src]="social.icon?.asset?.url"
            [alt]="social.icon?.alt"
            class="footer-social-icon"
          />
        </a>
      }
    </div>
  </div>

  <div class="footer-rights">
    ALL RIGHTS RESERVED 2026 &#64; GAVIN MORRIS
  </div>
</div>
